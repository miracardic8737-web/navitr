<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0277bd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Arka plan -->
  <rect width="512" height="512" fill="url(#bg)" rx="100"/>
  <!-- Dış halka -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#4fc3f7" stroke-width="6" opacity=".25"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#4fc3f7" stroke-width="2" opacity=".15"/>
  <!-- Ana ok - navigasyon üçgeni -->
  <polygon points="256,60 420,430 256,350 92,430" fill="url(#arrow)" filter="url(#glow)"/>
  <!-- Sol parlama -->
  <polygon points="256,60 174,245 256,210" fill="#81d4fa" opacity=".5"/>
  <!-- Sağ gölge -->
  <polygon points="256,60 338,245 256,210" fill="#01579b" opacity=".35"/>
  <!-- Merkez nokta -->
  <circle cx="256" cy="290" r="36" fill="#fff" opacity=".95"/>
  <circle cx="256" cy="290" r="20" fill="#0277bd"/>
  <circle cx="256" cy="290" r="8" fill="#4fc3f7"/>
</svg>
